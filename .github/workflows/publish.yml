name: CI / Publish to npm

# Trigger only manually
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (optional)'
        required: false
        default: ''

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/tags/release'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/tags/release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Determine dist-tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" -le 1 ]; then
            echo "tag=legacy" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.dist_tag.outputs.tag }} --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}